<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
 background:linear-gradient(135deg,#ff4d6d,#ffafcc);
 color:#fff;
 font-family:'Great Vibes',cursive;
 text-align:center;
 overflow:hidden;
 transition:0.5s;
}

/* 🔥 BIGGER UI */
h1{font-size:3.8rem;}
h2{font-size:2.3rem;}

/* ATTRACTIVE BUTTONS FOR ALL PAGES */
button{
 font-size:1.3rem;
 padding:14px 30px;
 border:none;
 border-radius:35px;
 background:linear-gradient(45deg,#ff4d6d,#ffafcc);
 color:#fff;
 font-weight:bold;
 cursor:pointer;
 box-shadow:0 0 20px #ffafcc,0 0 40px #ff4d6d;
 transition:0.4s;
}
button:hover{
 transform:scale(1.1);
 box-shadow:0 0 30px #fff,0 0 60px #ff4d6d;
}

/* DARK MODE */
.dark{background:black !important;}

/* DISCO LIGHT */
.disco{
 position:fixed;
 width:100%;
 height:100%;
 top:0;
 left:0;
 pointer-events:none;
 background:linear-gradient(45deg,#ff0000,#00ffcc,#ff00ff,#ffff00,#ff4d6d);
 mix-blend-mode:overlay;
 animation:disco 3s linear infinite;
 opacity:0.3;
}
@keyframes disco{100%{filter:hue-rotate(360deg);}}

/* HEART RAIN */
.heart{
 position:fixed;
 top:-20px;
 font-size:30px;
 animation:fall linear infinite;
 z-index:999;
}
@keyframes fall{to{transform:translateY(110vh);}}

/* FIREWORK */
.firework{
 position:fixed;
 font-size:30px;
 animation:boom 1s ease-out forwards;
}
@keyframes boom{
 0%{transform:scale(0);opacity:1;}
 100%{transform:scale(3);opacity:0;}
}

/* PAGES */
.page{
 display:none;
 height:100vh;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
}

/* 🔒 LOCK PAGE ATTRACTIVE */
.lockBox{
 background:rgba(255,255,255,0.15);
 padding:70px 80px;
 border-radius:40px;
 box-shadow:0 0 60px rgba(255,77,109,0.8),0 0 40px rgba(255,175,204,0.5);
 backdrop-filter:blur(25px);
 text-align:center;
 animation:pop 0.8s ease-out;
}
@keyframes pop{
 0%{transform:scale(0.5);opacity:0;}
 100%{transform:scale(1);opacity:1;}
}
.lockBox h1{
 font-size:4rem;
 margin-bottom:20px;
 text-shadow:0 0 20px #fff,0 0 40px #ff4d6d;
}
.lockBox p{
 font-size:2rem;
 margin-bottom:25px;
 color:#fff;
 text-shadow:0 0 15px #ffafcc;
}
.lockBox input{
 padding:18px;
 border-radius:35px;
 border:none;
 width:250px;
 text-align:center;
 margin-bottom:20px;
 font-size:1.3rem;
 box-shadow:0 0 15px #ffafcc,0 0 25px #ff4d6d inset;
 transition:0.3s;
}
.lockBox input:focus{
 outline:none;
 box-shadow:0 0 25px #fff,0 0 40px #ff4d6d inset;
}

/* GAME */
#gameArea span{
 position:absolute;
 font-size:50px;
 cursor:pointer;
}

/* LETTER */
#letterText{
 font-size:2.5rem;
 width:85%;
 line-height:1.9;
 white-space:pre-line;
 border:4px solid #fff;
 border-radius:25px;
 padding:40px;
 background:rgba(255,255,255,0.2);
 text-align:left;
}

/* CAKE DESIGN */
.cake{
 margin-top:30px;
 position:relative;
}
.layer{
 width:260px;
 height:55px;
 margin:10px auto;
 border-radius:18px;
 background:linear-gradient(45deg,#ff85a2,#ffc2d1);
 box-shadow:0 10px 20px rgba(0,0,0,0.3);
 opacity:0;
}
#l2{background:linear-gradient(45deg,#ffb703,#ffd166);}
#l3{background:linear-gradient(45deg,#90dbf4,#48cae4);}

/* 🔥 3 CANDLES IMPROVED */
.candles{
 position:absolute;
 top:-60px;
 left:50%;
 transform:translateX(-50%);
 display:flex;
 gap:18px;
 opacity:0;
}
.candle{
 width:12px;
 height:40px;
 background:white;
 position:relative;
 border-radius:3px;
}
.flame{
 width:14px;
 height:14px;
 background:orange;
 border-radius:50%;
 position:absolute;
 top:-14px;
 left:-1px;
 animation:flicker 0.3s infinite;
}
@keyframes flicker{to{transform:scale(1.3);}}

/* FINAL */
#finalText{
 font-size:2.8rem;
 margin-top:20px;
}
#response{
 font-size:2rem;
 margin-top:15px;
}

/* ✨ QUOTE */
.quote{
 font-size:2rem;
 margin-top:20px;
 opacity:0.9;
}

/* 🖼️ FRAME */
.frame{
 margin-top:25px;
 padding:20px 40px;
 border:5px solid #fff;
 border-radius:20px;
 font-size:2.5rem;
 box-shadow:0 0 20px #fff,0 0 40px #ff4d6d;
}
</style>
</head>

<body>

<div class="disco"></div>

<script>
// HEART RAIN
for(let i=0;i<80;i++){
 let h=document.createElement("div");
 h.className="heart";
 h.innerText="💖";
 h.style.left=Math.random()*100+"vw";
 h.style.animationDuration=(4+Math.random()*5)+"s";
 document.body.appendChild(h);
}
</script>

<!-- LOCK -->
<div id="lock" class="page" style="display:flex">
 <div class="lockBox">
  <h1>Birthday Surprise 🎁</h1>
  <p>Hint: Talha's Fav Teacher</p>
  <input id="pass" type="password">
  <button onclick="unlock()">Unlock 💖</button>
 </div>
</div>

<!-- GAME -->
<div id="game" class="page">
 <h1>🌸 Catch 10 Flowers 🌸</h1>
 <h2><span id="score">0</span>/10</h2>
 <div id="gameArea"></div>
</div>

<!-- LETTER -->
<div id="letter" class="page">
 <div id="letterText"></div>
 <button id="letterNext" style="display:none">Next 🎂</button>
</div>
!-- CAKE -->
<div id="cakePage" class="page">
 <h1>🎂 Make a Wish</h1>

 <div class="cake">
  <div class="layer" id="l1"></div>
  <div class="layer" id="l2"></div>
  <div class="layer" id="l3"></div>
  <div class="candles" id="candles">
   <div class="candle"><div class="flame"></div></div>
   <div class="candle"><div class="flame"></div></div>
   <div class="candle"><div class="flame"></div></div>
  </div>
 </div>

 <button onclick="startCake()">Start 🎂</button>
 <button id="nextFinal" style="display:none" onclick="showFinal()">Next 💖</button>
</div>

<!-- FINAL -->
<div id="final" class="page">
 <div id="finalText"></div>

 <h2>Do you like my surprise? 💖</h2>
 <button onclick="answer(true)">Yes 😊</button>
 <button onclick="answer(false)">No 💔</button>

 <div id="response"></div>

 <div class="quote">
  "A beautiful soul like you makes the world brighter every day 💫"
 </div>

 <div class="frame">
  🎂 Happy Birthday Day 🎂
 </div>
</div>

<script src="functions.js"></script>
<script>
// ELEMENTS
const pass=document.getElementById("pass");
const lock=document.getElementById("lock");
const game=document.getElementById("game");
const letter=document.getElementById("letter");
const cakePage=document.getElementById("cakePage");
const final=document.getElementById("final");

const letterText=document.getElementById("letterText");
const letterNext=document.getElementById("letterNext");

const scoreEl=document.getElementById("score");
const gameArea=document.getElementById("gameArea");

// UNLOCK
function unlock(){
 if(pass.value.toLowerCase().trim()=="bisma"){
  lock.style.display="none";
  game.style.display="flex";
  startGame();
 } else alert("Wrong Password 💔");
}

// GAME
let score=0;
function startGame(){
 let interval=setInterval(()=>{
  if(score>=10){clearInterval(interval);showLetter();return;}
  let f=document.createElement("span");
  f.innerText="🌸";
  f.style.left=Math.random()*90+"vw";
  f.style.top="-50px";
  f.style.animation="fall 4s linear";
  f.onclick=()=>{score++;scoreEl.innerText=score;f.remove();};
  setTimeout(()=>f.remove(),4000);
  gameArea.appendChild(f);
 },300);
}

// LETTER
function showLetter(){
 game.style.display="none";
 letter.style.display="flex";

 const text=`Dear Bisma Ma’am 💖
You are not just a teacher;you are beautiful inspiration that stays long time.Happy Birthday💖`;

 let i=0;
 (function type(){
  if(i<text.length){
   letterText.innerHTML+=text[i++];
   setTimeout(type,30);
  } else letterNext.style.display="block";
 })();

 letterNext.onclick=function(){
  letter.style.display="none";
  cakePage.style.display="flex";
 }
}

// CAKE
function startCake(){
 document.body.classList.add("dark");

 setTimeout(()=>l1.style.opacity=1,500);
 setTimeout(()=>l2.style.opacity=1,1000);
 setTimeout(()=>l3.style.opacity=1,1500);
 setTimeout(()=>candles.style.opacity=1,2000);
 setTimeout(()=>nextFinal.style.display="block",2500);
}

// FINAL
function showFinal(){
 document.body.classList.remove("dark");
 cakePage.style.display="none";
 final.style.display="flex";

 setInterval(()=>{
  let f=document.createElement("div");
  f.className="firework";
  f.innerText="🎆";
  f.style.left=Math.random()*100+"vw";
  f.style.top=Math.random()*100+"vh";
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),1000);
 },300);
}

// RESPONSE
function answer(val){
 let r=document.getElementById("response");
 if(val){
  r.innerHTML="yeee💖 You are Make My Day Thnks!";
 }else{
  r.innerHTML="Oh no 💔 I’ll try to make it better next time...";
 }
}
</script>

</body>
</html>
