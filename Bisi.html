<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
 background:linear-gradient(135deg,#ff4d6d,#ffafcc);
 color:#fff;
 font-family:'Great Vibes',cursive;
 text-align:center;
 overflow:hidden;
 transition:0.5s;
}

/* 🔥 UI SIZING */
h1{font-size:3.8rem;}
h2{font-size:2.3rem;}

button{
 font-size:1.3rem;
 padding:14px 30px;
 border:none;
 border-radius:35px;
 background:linear-gradient(45deg,#ff4d6d,#ffafcc);
 color:#fff;
 font-weight:bold;
 cursor:pointer;
 box-shadow:0 0 20px #ffafcc,0 0 40px #ff4d6d;
 transition:0.4s;
}
button:hover{
 transform:scale(1.1);
 box-shadow:0 0 30px #fff,0 0 60px #ff4d6d;
}

.dark{background:black !important;}

.disco{
 position:fixed;
 width:100%;
 height:100%;
 top:0;
 left:0;
 pointer-events:none;
 background:linear-gradient(45deg,#ff0000,#00ffcc,#ff00ff,#ffff00,#ff4d6d);
 mix-blend-mode:overlay;
 animation:disco 3s linear infinite;
 opacity:0.3;
}
@keyframes disco{100%{filter:hue-rotate(360deg);}}

/* SNOW */
.snow{
 position:fixed;
 top:-20px;
 color: rgba(255, 255, 255, 0.6);
 animation:fall linear infinite;
 z-index:999;
 pointer-events: none;
}
@keyframes fall{to{transform:translateY(110vh);}}

/* CONFETTI */
.confetti {
  position: fixed;
  width: 12px;
  height: 12px;
  z-index: 1000;
  border-radius: 2px;
  animation: confettiFall 3s ease-out forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* PAGES */
.page{
 display:none;
 height:100vh;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 padding: 20px;
}

/* LOCK BOX */
.lockBox{
 background:rgba(255,255,255,0.15);
 padding:70px 80px;
 border-radius:40px;
 box-shadow:0 0 60px rgba(255,77,109,0.8),0 0 40px rgba(255,175,204,0.5);
 backdrop-filter:blur(25px);
 animation:pop 0.8s ease-out;
}
@keyframes pop{
 0%{transform:scale(0.5);opacity:0;}
 100%{transform:scale(1);opacity:1;}
}
.lockBox input{
 padding:18px;
 border-radius:35px;
 border:none;
 width:250px;
 text-align:center;
 margin-bottom:20px;
 font-size:1.3rem;
 box-shadow:0 0 15px #ffafcc, 0 0 25px #ff4d6d inset;
}

/* GAME */
#gameArea span{ position:absolute; font-size:50px; cursor:pointer; }

/* LETTER */
#letterText{
 font-size:2.5rem;
 width:85%;
 line-height:1.9;
 white-space:pre-line;
 border:4px solid #fff;
 border-radius:25px;
 padding:40px;
 background:rgba(255,255,255,0.2);
 text-align:left;
}

/* CAKE */
.cake{ margin-top:30px; position:relative; }
.layer{
 width:260px;
 height:55px;
 margin:10px auto;
 border-radius:18px;
 background:linear-gradient(45deg,#ff85a2,#ffc2d1);
 box-shadow:0 10px 20px rgba(0,0,0,0.3);
 opacity:0;
 transition: opacity 0.8s;
}
#l2{background:linear-gradient(45deg,#ffb703,#ffd166);}
#l3{background:linear-gradient(45deg,#90dbf4,#48cae4);}

.candles{
 position:absolute;
 top:-60px;
 left:50%;
 transform:translateX(-50%);
 display:flex;
 gap:18px;
 opacity:0;
 transition: opacity 0.8s;
}
.candle{ width:12px; height:40px; background:white; border-radius:3px; position:relative; }
.flame{
 width:14px; height:14px; background:orange; border-radius:50%;
 position:absolute; top:-14px; left:-1px; animation:flicker 0.3s infinite;
}
@keyframes flicker{to{transform:scale(1.3);}}

/* FINAL & EXTRA PAGE */
.frame{
 margin-top:25px;
 padding:20px 40px;
 border:5px solid #fff;
 border-radius:20px;
 font-size:2.5rem;
 box-shadow:0 0 20px #fff, 0 0 40px #ff4d6d;
}
#noBtn { position: relative; transition: 0.2s; }
#response { font-size:2rem; margin-top:15px; min-height: 40px; }
</style>
</head>

<body>

<div class="disco"></div>

<script>
for(let i=0;i<80;i++){
 let s=document.createElement("div");
 s.className="snow";
 s.innerText="❄";
 s.style.left=Math.random()*100+"vw";
 s.style.fontSize=(Math.random()*15 + 10)+"px";
 s.style.opacity=Math.random();
 s.style.animationDuration=(4+Math.random()*5)+"s";
 document.body.appendChild(s);
}
</script>

<div id="lock" class="page" style="display:flex">
 <div class="lockBox">
  <h1>Birthday Surprise 🎁</h1>
  <p style="font-size: 2rem; margin-bottom: 20px;">Hint: Talha's Fav Teacher</p>
  <input id="pass" type="password">
  <button onclick="unlock()">Unlock 💖</button>
 </div>
</div>

<div id="game" class="page">
 <h1>🌸 Catch 10 Flowers 🌸</h1>
 <h2><span id="score">0</span>/10</h2>
 <div id="gameArea"></div>
</div>

<div id="letter" class="page">
 <div id="letterText"></div>
 <button id="letterNext" style="display:none; margin-top: 20px;">Next 🎂</button>
</div>

<div id="cakePage" class="page" style="justify-content: flex-start; padding-top: 40px;">
 <h1>🎂 Make a Wish</h1>
 <div style="flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;">
    <div class="cake">
      <div class="layer" id="l1"></div>
      <div class="layer" id="l2"></div>
      <div class="layer" id="l3"></div>
      <div class="candles" id="candles">
       <div class="candle"><div class="flame"></div></div>
       <div class="candle"><div class="flame"></div></div>
       <div class="candle"><div class="flame"></div></div>
      </div>
     </div>
     <button onclick="startCake()" style="margin-top: 40px;">Start 🎂</button>
     <button id="nextFinal" style="display:none; margin-top: 20px;" onclick="showFinal()">Next 💖</button>
 </div>
</div>

<div id="final" class="page">
 <h1 id="finalTitle">Party Time! ✨</h1>
 <h2>Do you like my surprise? 💖</h2>
 <div style="margin-top:20px;">
    <button onclick="answer(true)">Yes 😊</button>
    <button id="noBtn" onmouseover="dodgeNo()" onclick="dodgeNo()">No 💔</button>
 </div>
 <div id="response"></div>
 <button id="toLastPage" style="display:none; margin-top: 30px;" onclick="showLastPage()">One More Thing... ✨</button>
</div>

<div id="lastPage" class="page">
 <div class="frame">🎂 Happy Birthday Day 🎂</div>
 <div style="font-size: 2.5rem; margin-top: 30px; line-height: 1.5;">
    "A beautiful soul like you makes the world brighter every day 💫"<br>
    <span style="font-size: 1.8rem;">Wishing you a year full of happiness and success!</span>
 </div>
 <button onclick="location.reload()" style="margin-top: 40px; font-size: 1rem;">Restart Surprise 🔄</button>
</div>

<script>
const pass=document.getElementById("pass");
const lock=document.getElementById("lock");
const game=document.getElementById("game");
const letter=document.getElementById("letter");
const cakePage=document.getElementById("cakePage");
const final=document.getElementById("final");
const lastPage=document.getElementById("lastPage");
const letterText=document.getElementById("letterText");
const letterNext=document.getElementById("letterNext");
const scoreEl=document.getElementById("score");
const gameArea=document.getElementById("gameArea");

function unlock(){
 if(pass.value.toLowerCase().trim()=="bisma"){
  lock.style.display="none";
  game.style.display="flex";
  startGame();
 } else alert("Wrong Password 💔");
}

let score=0;
function startGame(){
 let interval=setInterval(()=>{
  if(score>=10){clearInterval(interval);showLetter();return;}
  let f=document.createElement("span");
  f.innerText="🌸";
  f.style.left=Math.random()*90+"vw";
  f.style.top="-50px";
  f.style.animation="fall 4s linear";
  f.onclick=()=>{score++;scoreEl.innerText=score;f.remove();};
  setTimeout(()=>f.remove(),4000);
  gameArea.appendChild(f);
 },300);
}

function showLetter(){
 game.style.display="none";
 letter.style.display="flex";
 const text=`Dear Miss💖\n\nYou're not just a teacher; You're a beautiful inspiration that stays always.\n\nHappy Birthday💖`;
 let i=0;
 (function type(){
  if(i<text.length){
   letterText.innerHTML+=text[i++];
   setTimeout(type,40);
  } else letterNext.style.display="block";
 })();
 letterNext.onclick=function(){
  letter.style.display="none";
  cakePage.style.display="flex";
 }
}

function startCake(){
 document.body.classList.add("dark");
 const l1=document.getElementById("l1"), l2=document.getElementById("l2"), l3=document.getElementById("l3"), candles=document.getElementById("candles"), nextFinal=document.getElementById("nextFinal");
 setTimeout(()=>l1.style.opacity=1,500);
 setTimeout(()=>l2.style.opacity=1,1000);
 setTimeout(()=>l3.style.opacity=1,1500);
 setTimeout(()=>candles.style.opacity=1,2000);
 setTimeout(()=>nextFinal.style.display="block",2500);
}

function showFinal(){
 document.body.classList.remove("dark");
 cakePage.style.display="none";
 final.style.display="flex";
 startConfetti();
}

function startConfetti(){
 const colors = ['#ff4d6d', '#ffafcc', '#ffb703', '#90dbf4', '#fff', '#ff00ff'];
 setInterval(() => {
  if(lastPage.style.display === "flex" || final.style.display === "flex"){
      for(let i=0; i<5; i++) {
        let c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random() * 100 + "vw";
        c.style.top = "-10px";
        c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        c.style.animationDuration = (Math.random() * 2 + 2) + "s";
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 3000);
      }
  }
 }, 300);
}

function dodgeNo() {
    const noBtn = document.getElementById("noBtn");
    noBtn.style.position = "fixed";
    noBtn.style.left = Math.random() * (window.innerWidth - 100) + "px";
    noBtn.style.top = Math.random() * (window.innerHeight - 50) + "px";
}

function answer(val){
 if(val){
  document.getElementById("response").innerHTML="yeee💖 You Made My Day Thnks!";
  document.getElementById("noBtn").style.display = "none";
  document.getElementById("toLastPage").style.display = "block";
 }
}

function showLastPage(){
    final.style.display = "none";
    lastPage.style.display = "flex";
}
</script>

</body>
</html>
